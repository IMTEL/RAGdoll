# =============================================================================
# Docker Compose Configuration for Local RAGdoll Development
# =============================================================================
# Purpose: Complete local development environment with MongoDB
# Usage: docker compose -f docker-compose.local.yml up --build
#
# Services:
#   - mongodb: Local MongoDB database
#   - keycloak: Local identity provider
#   - backend: FastAPI application
#
# Features:
#   - Hot-reload for development
#   - Persistent MongoDB data
#   - Health checks
#   - All data stored locally
# =============================================================================

name: ragdoll

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: ragdoll-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: changeme
      MONGO_INITDB_DATABASE: ragdoll_dev
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      # Mount initialization script
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - ragdoll-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Keycloak Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: ragdoll-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HOSTNAME: localhost
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/realm-ragdoll.json:/opt/keycloak/data/import/realm-ragdoll.json:ro
    networks:
      - ragdoll-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # FastAPI Backend Service
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    image: ragdoll-backend:latest
    container_name: ragdoll-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for hot-reload during development
      - .:/app
      - ./temp_files:/app/temp_files
      # Volume for local FAISS vector indices
      - faiss_indices:/data/faiss_indices
      # Volume for local Piper TTS voices
      - piper_voices:/data/piper/voices
    env_file:
      - .env
    environment:
      # Override MongoDB URI to use local container
      - MONGODB_URI=mongodb://admin:changeme@mongodb:27017/ragdoll_dev?authSource=admin
      - MONGODB_DATABASE=ragdoll_dev
      - KEYCLOAK_BASE_URL=http://keycloak:8080
      - KEYCLOAK_REALM=ragdoll
      - KEYCLOAK_CLIENT_ID=ragdoll-config
      - KEYCLOAK_CLIENT_SECRET=ragdoll-config-secret
      - KEYCLOAK_VERIFY_AUDIENCE=false
      - KEYCLOAK_ISSUER=http://localhost:8080/realms/ragdoll
      - KEYCLOAK_ALLOWED_ISSUERS=http://localhost:8080/realms/ragdoll,http://localhost/realms/ragdoll
      - KEYCLOAK_JWKS_URL=http://keycloak:8080/realms/ragdoll/protocol/openid-connect/certs
      - AUTH_BOOTSTRAP_ENABLED=${AUTH_BOOTSTRAP_ENABLED:-true}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - WHISPER_CPU_THREADS=${WHISPER_CPU_THREADS:-0}
      - WHISPER_NUM_WORKERS=${WHISPER_NUM_WORKERS:-1}
      - WHISPER_BEAM_SIZE=${WHISPER_BEAM_SIZE:-1}
      - WHISPER_VAD_FILTER=${WHISPER_VAD_FILTER:-false}
      - TTS_ENGINE=${TTS_ENGINE:-piper}
      - TTS_VOICE_DIR=${TTS_VOICE_DIR:-/data/piper/voices}
      - TTS_DEFAULT_LANGUAGE=${TTS_DEFAULT_LANGUAGE:-en}
      - TTS_DEFAULT_VOICE_EN=${TTS_DEFAULT_VOICE_EN:-en_US-lessac-medium}
      - TTS_DEFAULT_VOICE_NO=${TTS_DEFAULT_VOICE_NO:-no_NO-talesyntese-medium}
      - TTS_DEFAULT_VOICE_ES=${TTS_DEFAULT_VOICE_ES:-es_ES-davefx-medium}
      - TTS_USE_CUDA=${TTS_USE_CUDA:-false}
      - TTS_WARMUP_TEXT=${TTS_WARMUP_TEXT:-Ready.}
    networks:
      - ragdoll-network
    depends_on:
      mongodb:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Persistent volumes for MongoDB data and FAISS indices
volumes:
  mongodb_data:
    driver: local
    name: ragdoll_mongodb_data
  mongodb_config:
    driver: local
    name: ragdoll_mongodb_config
  keycloak_data:
    driver: local
    name: ragdoll_keycloak_data
  faiss_indices:
    driver: local
    name: ragdoll_faiss_indices
  piper_voices:
    driver: local
    name: ragdoll_piper_voices

# Network for service communication
networks:
  ragdoll-network:
    driver: bridge
    name: ragdoll-network
